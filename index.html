<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chasse au Trésor - Labyrinthe En-Champ-Thé</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌿 Chasse au Trésor 🌿</h1>
            <p class="subtitle">Édition de Pâques</p>
        </header>

        <section class="main-ui">
            <button id="scan-btn" onclick="startScanner()" class="primary-btn scan-btn">
                📸 Scanner une borne
            </button>
            
            <div id="reader-container">
                <div id="reader"></div>
                <button id="stop-scan" onclick="stopScanner()" class="secondary-btn" style="display:none;">Annuler le scan</button>
            </div>

            <div id="game-board" class="game-board"></div>

            <div id="final-quest" class="final-card" style="display:none;">
                <h3>🔍 L'Énigme Finale</h3>
                <p>Trouvez le code en comptant les œufs par colonne sur l'image ci-dessus.</p>
                <div id="code-display">0 0 0 0</div>
                <button onclick="checkFinalCode()" class="primary-btn">Valider le code</button>
            </div>
        </section>

        <footer>
            <button onclick="resetGame()" class="reset-btn">Réinitialiser la partie</button>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div id="question-header">
                <span id="question-difficulty"></span>
                <span id="life-counter"></span>
            </div>
            
            <div class="question-body">
                <p id="question-text"></p>
                <img id="rebus-image" src="" alt="Rébus">
                
                <div id="input-zone">
                    <input type="text" id="answer-input" placeholder="Votre réponse...">
                    <button onclick="submitAnswer()" class="primary-btn">Valider</button>
                </div>

                <div id="options-container" class="options-grid"></div>
            </div>
            <p id="feedback" class="feedback-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

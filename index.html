<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chasse au Trésor — En-Champ-Thé</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="brand">Le Labyrinthe En-Champ-Thé</div>
            <h1>Chasse au <span>Trésor</span></h1>
            
            <div class="progress-section">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <div id="progress-label">Progression : 0%</div>
            </div>
        </header>

        <main>
            <div id="scanner-ui">
                <button id="start-scan-btn" onclick="startScanner()" class="btn-primary">📸 Scanner une borne</button>
                <div id="camera-box" style="display:none;">
                    <div id="reader"></div>
                    <button onclick="stopScanner()" class="btn-cancel">Annuler le scan</button>
                </div>
            </div>

            <div id="game-board" class="game-board"></div>

            <div id="final-hunt-ui" style="display:none;">
                <div class="instructions">Trouvez les œufs cachés dans l'image !</div>
                <div id="code-display" class="code-row">
                    <div class="code-box"><span id="d-0">0</span><small>Col. I</small></div>
                    <div class="code-box"><span id="d-1">0</span><small>Col. II</small></div>
                    <div class="code-box"><span id="d-2">0</span><small>Col. III</small></div>
                    <div class="code-box"><span id="d-3">0</span><small>Col. IV</small></div>
                </div>
                <p class="final-hint">Le code final est <strong>2 · 1 · 1 · 9</strong></p>
            </div>
        </main>

        <footer>
            <button onclick="resetGame()" class="btn-reset">Réinitialiser la partie</button>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <button class="close-modal" onclick="closeModal()">×</button>
            <div class="modal-content">
                <div id="q-diff" class="badge"></div>
                <p id="q-text"></p>
                <img id="q-rebus" src="" alt="Rébus" style="display:none;">
                
                <div id="input-area" class="input-stack">
                    <input type="text" id="q-input" placeholder="Écrivez ici...">
                    <button onclick="submitAnswer()" class="btn-validate">Valider</button>
                </div>

                <div id="qcm-area" class="qcm-stack"></div>
            </div>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <div id="success-flash" class="success-flash">
        <div class="flash-text">GAGNÉ ! ✨</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
